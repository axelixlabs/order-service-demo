spring:
  application:
    name: order-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/orderdb}
    username: ${SPRING_DATASOURCE_USERNAME:orderuser}
    password: ${SPRING_DATASOURCE_PASSWORD:orderpass}
    hikari:
      maximum-pool-size: 10

  jpa:
    hibernate:
    properties:
      hibernate:
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true
        format_sql: false
    show-sql: false

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      properties:
        spring.json.add.type.headers: false
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: earliest
      properties:
        spring.json.trusted.packages: "com.example.orderservice.messaging"
        spring.json.value.default.type: com.example.orderservice.messaging.OrderCreatedEvent

app:
  seed:
    enabled: ${APP_SEED_ENABLED:true}
  kafka:
    order-events-topic: order-events
    consumer-group: order-service-consumers

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      # Stamped on every metric so Prometheus/Grafana can filter by app.
      application: order-service
    # Publish percentile histograms for HTTP timings (enables latency queries too).
    distribution:
      percentiles-histogram:
        http.server.requests: true

server:
  port: 8080
